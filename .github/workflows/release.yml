name: Build and Release OdinUP

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # Allows you to run it manually from the Actions tab to test without tagging!

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # Prevents the whole pipeline from stopping if 1 target fails
      matrix:
        include:
          # --- Linux NATIVE Runners ---
          - os: ubuntu-latest
            target: linux_amd64
            name: odinup-linux-amd64
            exe: odinup
            ext: tar.gz
            
          - os: ubuntu-24.04-arm # Native ARM runner! No cross-linking needed.
            target: linux_arm64
            name: odinup-linux-arm64
            exe: odinup
            ext: tar.gz
            
          # --- MacOS NATIVE Runners ---
          - os: macos-15-intel # Explicitly use Intel runner for AMD64
            target: darwin_amd64
            name: odinup-darwin-amd64
            exe: odinup
            ext: tar.gz
            
          - os: macos-latest # 'macos-latest' is natively ARM64 (Apple Silicon M1/M2)
            target: darwin_arm64
            name: odinup-darwin-arm64
            exe: odinup
            ext: tar.gz
            
          # --- Windows Runners ---
          - os: windows-latest
            target: windows_amd64
            name: odinup-windows-amd64
            exe: odinup.exe
            ext: zip
            
          - os: windows-latest
            target: windows_i386 # Cross-compiling x64 -> x86 on Windows natively works out of the box
            name: odinup-windows-i386
            exe: odinup.exe
            ext: zip

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Odin Compiler
        uses: laytan/setup-odin@v2
        with:
          release: "dev" 
          token: ${{ secrets.GITHUB_TOKEN }} # Fixes the "Invalid access token" GitHub API rate-limit warning

      - name: Compile OdinUP
        run: odin build . -target:${{ matrix.target }} -out:${{ matrix.exe }} -o:speed

      - name: Package Archive (Tar.gz)
        if: matrix.ext == 'tar.gz'
        shell: bash
        run: tar -czf ${{ matrix.name }}.tar.gz ${{ matrix.exe }}

      - name: Package Archive (Zip)
        if: matrix.ext == 'zip'
        shell: pwsh
        run: Compress-Archive -Path ${{ matrix.exe }} -DestinationPath ${{ matrix.name }}.zip

      - name: Upload Artifact to Workflow
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.${{ matrix.ext }} # Using Matrix variables eliminates the warning entirely!

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create the GitHub release
    steps:
      - name: Download all Compiled Archives
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release & Attach Binaries
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
          generate_release_notes: true