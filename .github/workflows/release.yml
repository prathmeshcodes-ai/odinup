name: Build and Release OdinUP

# Triggers automatically when you push a tag like v0.1.0
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # 1. Linux 64-bit (Standard)
          - os: ubuntu-latest
            target: linux_amd64
            name: odinup-linux-amd64
            exe: odinup
            setup_cmd: ""
          
          # 2. Linux ARM64 (Raspberry Pi, ARM Servers)
          - os: ubuntu-latest
            target: linux_arm64
            name: odinup-linux-arm64
            exe: odinup
            setup_cmd: "sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu"
          
          # 3. macOS 64-bit (Intel Macs)
          - os: macos-latest
            target: darwin_amd64
            name: odinup-darwin-amd64
            exe: odinup
            setup_cmd: ""
          
          # 4. macOS ARM64 (Apple Silicon M1/M2/M3)
          - os: macos-latest
            target: darwin_arm64
            name: odinup-darwin-arm64
            exe: odinup
            setup_cmd: ""
          
          # 5. Windows 64-bit (Standard)
          - os: windows-latest
            target: windows_amd64
            name: odinup-windows-amd64
            exe: odinup.exe
            setup_cmd: ""
            
          # 6. Windows 32-bit (Legacy / i386)
          - os: windows-latest
            target: windows_i386
            name: odinup-windows-i386
            exe: odinup.exe
            setup_cmd: ""

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Odin Compiler
        uses: laytan/setup-odin@v2
        with:
          version: "latest"

      - name: Install Cross-Linker (Linux ARM only)
        if: matrix.setup_cmd != ''
        run: ${{ matrix.setup_cmd }}

      - name: Compile OdinUP
        run: odin build . -target:${{ matrix.target }} -out:${{ matrix.exe }} -o:speed

      - name: Package Archive (Tar.gz)
        shell: bash # Forces Windows runner to use bash for tar, ensuring identical formats
        run: tar -czf ${{ matrix.name }}.tar.gz ${{ matrix.exe }}

      - name: Upload Artifact to Workflow
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.tar.gz

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to allow GitHub to create the Release
    steps:
      - name: Download all Compiled Archives
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release & Attach Binaries
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true